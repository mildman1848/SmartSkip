name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  baseline-check:
    name: Baseline Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required baseline files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .gitignore
            .gitattributes
            .prettierrc
            .prettierignore
            .editorconfig
            CHANGELOG.md
            CHANGELOG.DE.md
            README.md
            README.DE.md
            CONTRIBUTING.md
            CONTRIBUTING.DE.md
            SECURITY.md
            SECURITY.DE.md
            LICENSE
            VERSION
            .github/FUNDING.yml
            .github/dependabot.yml
            .github/PULL_REQUEST_TEMPLATE.md
            .github/ISSUE_TEMPLATE/config.yml
            .github/ISSUE_TEMPLATE/issue.bug.yml
            .github/ISSUE_TEMPLATE/issue.feature.yml
          )
          for path in "${required[@]}"; do
            test -f "$path"
          done

      - name: Reminder
        run: echo "Customize this workflow with real project build, test, and lint commands."
